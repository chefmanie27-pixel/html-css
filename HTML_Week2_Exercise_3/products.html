<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Products</title>
</head>
<body>
    <section class="hero">
        <header>
            <h1>Premium Tech Store</h1>
            <p>Discover the next generation of mobile innovation.</p>
        </header>
    </section>

    <main>
        <div class="product_card">
          <img src="https://placehold.co/265x250"
          /><br />
          <h2> Apple iPhone 13</h2>
          <label for="price_1">Price: R11,999</label><br />
          <button>Add to Cart</button>
        </div>

        <div class="product_card">
          <img
            src="https://placehold.co/265x250"
          /><br />
            <h2>Samsung Galaxy S26 </h2>
          <label for="price_2">Price: R16,700</label><br />
          <button>Add to Cart</button>
        </div>

        <div class="product_card">
          <img
            src="https://placehold.co/265x250"
          /><br />
          <h2>OPPO A38 128GB Dual Sim</h2>
          <label for="price_3">Price: R4,299</label><br />
          <button>Add to Cart</button>
        </div>

        <div class="product_card">
          <img
            src="https://placehold.co/265x250"
          /><br />
          <h2>Huawei Nova 11i 128GB LTE Dual Sim Smartphone</h2>
          <label for="price_4">Price: R6,899</label><br />
          <button>Add to Cart</button>
        </div>

        <div class="product_card">
          <img
            src="https://placehold.co/265x250"
          /><br />
          <h2>Motorola Edge 30 16,6 cm (6.55") Dual Sim Andriod 12 5G USB</h2>
          <label for="price_5">Price: R5,331</label><br />
          <button>Add to Cart</button>
        </div>

        <div class="product_card">
          <img
            src="https://placehold.co/265x250"
          /><br />
          <h2>Honor 600 Lite 256GB - Velvet Black</h2>
          <label for="price_6">Price: R7,999</label><br />
          <button>Add to Cart</button>
        </div>
    </main>
    
</body>
</html>
